<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sitebolt — Project Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #111111;
  --paper: #ffffff;
  --surface: #f7f7f7;
  --surface2: #efefef;
  --blue: #378ADD;
  --blue-dark: #2a6db8;
  --blue-dim: rgba(55,138,221,0.12);
  --steel: #444444;
  --muted: #888888;
  --border: #e2e2e2;
  --navy: #111827;
  --green: #30d158;
  --red: #ff453a;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--surface);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* TOP BAR */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand-mark {
  width: 32px; height: 32px;
  background: #1a2f52;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
}
.brand-mark svg { width: 18px; height: 12px; }
.brand-word {
  font-size: 17px;
  letter-spacing: -0.3px;
  color: var(--ink);
  line-height: 1;
}
.brand-word strong { font-weight: 600; }
.brand-word span { font-weight: 400; }
.topbar-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 13px;
  color: var(--muted);
}
.save-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}
.save-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
}

/* PROGRESS */
.progress-wrap {
  max-width: 820px;
  margin: 0 auto;
  padding: 32px 32px 0;
}
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--blue);
  width: 0%;
  transition: width 0.4s ease;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.3px;
  text-transform: uppercase;
  font-weight: 600;
}

/* CARD */
.card {
  max-width: 820px;
  margin: 24px auto;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 48px 56px;
}
@media (max-width: 700px) {
  .card { padding: 32px 24px; margin: 16px; }
  .topbar { padding: 14px 18px; }
  .progress-wrap { padding: 24px 18px 0; }
}
.eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 16px;
}
.step-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 4vw, 44px);
  line-height: 1.1;
  font-weight: 400;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.step-sub {
  font-size: 16px;
  color: var(--steel);
  line-height: 1.6;
  margin-bottom: 40px;
  max-width: 560px;
}

/* FIELDS */
.field { margin-bottom: 24px; }
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.field-row .field { margin-bottom: 0; }
@media (max-width: 640px) {
  .field-row { grid-template-columns: 1fr; }
}
label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
  letter-spacing: 0.1px;
}
label .hint {
  font-weight: 400;
  color: var(--muted);
  font-size: 12px;
  margin-left: 6px;
}
input[type="text"],
input[type="email"],
input[type="tel"],
input[type="url"],
input[type="number"],
textarea,
select {
  width: 100%;
  padding: 13px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  color: var(--ink);
  background: #fff;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px var(--blue-dim);
}
textarea {
  min-height: 110px;
  resize: vertical;
  line-height: 1.6;
}
input::placeholder, textarea::placeholder { color: #b0b0b0; }

.radio-group, .check-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.radio-option, .check-option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.radio-option:hover, .check-option:hover { border-color: #c6c6c6; }
.radio-option.selected, .check-option.selected {
  border-color: var(--blue);
  background: var(--blue-dim);
}
.radio-option input, .check-option input {
  margin-top: 2px;
  accent-color: var(--blue);
  flex-shrink: 0;
}
.opt-main { font-weight: 600; font-size: 14px; color: var(--ink); }
.opt-sub { font-size: 13px; color: var(--muted); margin-top: 2px; line-height: 1.5; }

/* COMPETITOR ROWS */
.competitor-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.competitor-row input { font-size: 14px; padding: 11px 14px; }
@media (max-width: 640px) { .competitor-row { grid-template-columns: 1fr; } }

/* BUTTONS */
.btn-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 40px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
  gap: 16px;
}
.btn {
  padding: 14px 28px;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.1px;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--blue);
  color: #fff;
}
.btn-primary:hover { background: var(--blue-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  color: var(--steel);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--ink); color: var(--ink); }
.btn-text {
  background: transparent;
  color: var(--muted);
  padding: 8px 12px;
  font-size: 13px;
}
.btn-text:hover { color: var(--ink); }

/* PLAN SWITCH */
.plan-switch {
  display: inline-flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 4px;
  gap: 2px;
}
.plan-btn {
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.plan-btn.active {
  background: var(--blue);
  color: #fff;
}

/* REVIEW STEP */
.review-group {
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.review-group:last-of-type { border-bottom: none; }
.review-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.review-head h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.3px;
}
.review-item {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 16px;
  padding: 8px 0;
  font-size: 14px;
}
.review-label { color: var(--muted); font-weight: 500; }
.review-value { color: var(--ink); white-space: pre-wrap; }
.review-value.empty { color: #c0c0c0; font-style: italic; }
@media (max-width: 640px) {
  .review-item { grid-template-columns: 1fr; gap: 2px; }
}
.edit-link {
  font-size: 12px;
  color: var(--blue);
  font-weight: 600;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.edit-link:hover { color: var(--blue-dark); }

/* SUBMIT / BRIEF */
.submit-panel {
  text-align: center;
  padding: 32px 0;
}
.submit-note {
  font-size: 14px;
  color: var(--muted);
  margin-top: 16px;
  line-height: 1.6;
}

/* LOADING */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 20px;
  text-align: center;
}
.spinner {
  width: 42px; height: 42px;
  border: 3px solid var(--surface2);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--steel);
  text-transform: uppercase;
}
.loading-sub {
  font-size: 13px;
  color: var(--muted);
  max-width: 420px;
  line-height: 1.6;
}

/* BRIEF OUTPUT */
.brief-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
  gap: 16px;
  flex-wrap: wrap;
}
.brief-title {
  font-family: 'DM Serif Display', serif;
  font-size: 36px;
  line-height: 1.1;
  font-weight: 400;
  letter-spacing: -0.5px;
}
.brief-body {
  font-size: 15px;
  line-height: 1.75;
  color: var(--steel);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 28px 32px;
  white-space: pre-wrap;
  font-family: 'Inter', sans-serif;
  max-height: 600px;
  overflow-y: auto;
}
.brief-body h2, .brief-body h3 { color: var(--ink); font-family: 'Inter', sans-serif; }
.success-banner {
  background: rgba(48,209,88,0.08);
  border: 1px solid rgba(48,209,88,0.3);
  color: #1a8e35;
  padding: 14px 18px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* FOOTER */
.page-footer {
  text-align: center;
  padding: 24px;
  font-size: 12px;
  color: var(--muted);
}
.page-footer a { color: var(--blue); text-decoration: none; }

/* PRO BADGE */
.pro-pill {
  display: inline-block;
  background: var(--blue);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 999px;
  text-transform: uppercase;
  margin-left: 8px;
  vertical-align: middle;
}

.hide { display: none !important; }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="#">
    <div class="brand-mark">
      <svg viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 0L3 8h4l-2 6 8-8h-4l2-6z" fill="#378ADD"/>
      </svg>
    </div>
    <div class="brand-word"><strong>site</strong><span>bolt</span></div>
  </a>
  <div class="topbar-meta">
    <div class="plan-switch">
      <button class="plan-btn" id="plan-standard" onclick="setPlan('standard')">Standard</button>
      <button class="plan-btn active" id="plan-pro" onclick="setPlan('pro')">Pro</button>
    </div>
    <div class="save-indicator" id="save-indicator">
      <span class="save-dot"></span>
      <span id="save-text">Saved</span>
    </div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="progress-meta">
    <span id="progress-step">Step 1</span>
    <span id="progress-percent">0%</span>
  </div>
</div>

<div class="card" id="card">
  <!-- STEPS RENDERED HERE -->
</div>

<div class="page-footer">
  Need help? Email <a href="mailto:hello@sitebolt.co">hello@sitebolt.co</a> &middot; Your answers save automatically in your browser.
</div>

<script>
// ===== STEP DEFINITIONS =====
// Each step has: id, title, sub, fields[], plans (which plans see this step)
const STEPS = [
  {
    id: 'business',
    title: 'Tell us about your business.',
    sub: 'The basics. We need to know who we\'re building for and how to reach you.',
    plans: ['standard','pro'],
    fields: [
      { type: 'row', fields: [
        { id: 'ownerName', label: 'Your name', placeholder: 'Jane Smith', required: true },
        { id: 'ownerEmail', label: 'Your email', type: 'email', placeholder: 'you@business.com', required: true }
      ]},
      { type: 'row', fields: [
        { id: 'ownerPhone', label: 'Your phone', type: 'tel', placeholder: '615-555-0100' },
        { id: 'role', label: 'Your role', placeholder: 'Owner, founder, marketing lead...' }
      ]},
      { id: 'businessName', label: 'Business name', placeholder: 'The name your customers know you by', required: true },
      { id: 'businessDesc', label: 'One-sentence description of your business', hint: '(what do you do and for whom)', type: 'textarea', placeholder: 'We are a residential HVAC company serving homeowners in Middle Tennessee...', required: true },
      { type: 'row', fields: [
        { id: 'yearsInBiz', label: 'Years in business', type: 'number', placeholder: '7' },
        { id: 'teamSize', label: 'Team size', placeholder: 'Just me / 2-5 / 6-20 / 20+' }
      ]},
      { id: 'businessAddress', label: 'Business address or headquarters', hint: '(for Google Business Profile + footer)', placeholder: '123 Main St, Nashville TN 37201' }
    ]
  },
  {
    id: 'services',
    title: 'What do you sell?',
    sub: 'List every service or product you want the site to represent. Be specific. We use this to build your pages and meta-data.',
    plans: ['standard','pro'],
    fields: [
      { id: 'services', label: 'Services or products', hint: '(one per line)', type: 'textarea', placeholder: 'AC repair\nAC installation\nFurnace tune-ups\nDuct cleaning\nEmergency service', required: true, minHeight: 160 },
      { id: 'serviceArea', label: 'Service area', hint: '(cities, zip codes, radius, or nationwide)', type: 'textarea', placeholder: 'Davidson, Williamson, Rutherford counties. Roughly 30 miles around Nashville.', required: true },
      { id: 'priceRange', label: 'Typical price range or starting price', hint: '(we use this for qualifying language)', placeholder: '$150 service call, repairs $250-900, installs $4k-12k' },
      { id: 'topServices', label: 'Top 3 services by revenue', hint: '(these get priority pages)', type: 'textarea', placeholder: '1. AC installations\n2. Furnace replacements\n3. Maintenance memberships' }
    ]
  },
  {
    id: 'customer',
    title: 'Who is your customer?',
    sub: 'The clearer you are about your ideal customer, the better the site converts. Write the person, not the demographic.',
    plans: ['standard','pro'],
    fields: [
      { id: 'idealCustomer', label: 'Describe your ideal customer', hint: '(age, income, life situation, what triggers them to search)', type: 'textarea', placeholder: 'Homeowners 35-65, household income $75k+, usually married with kids at home, most often they find us because their AC just died in July.', required: true },
      { id: 'customerPain', label: 'What problem are they trying to solve?', type: 'textarea', placeholder: 'They need a company they can trust to not rip them off and to actually show up when promised.', required: true },
      { id: 'customerObjections', label: 'Top 3 reasons they hesitate', hint: '(price, trust, availability, etc.)', type: 'textarea', placeholder: '1. Worried about upsell / being oversold\n2. Unsure we can get to them fast enough\n3. Price anxiety, want upfront quotes' }
    ]
  },
  {
    id: 'competitors',
    title: 'Who are you competing with?',
    sub: 'Three competitors. We audit their sites and position yours to win against them.',
    plans: ['standard','pro'],
    fields: [
      { type: 'competitors' },
      { id: 'whyYou', label: 'Why should a customer pick you over them?', hint: '(write in your own voice, we\'ll polish)', type: 'textarea', placeholder: 'We are the only company in town with next-day install on full AC systems. We don\'t subcontract. Our techs are all NATE certified. We pick up the phone on weekends.', required: true }
    ]
  },
  {
    id: 'brand',
    title: 'What does your brand look and sound like?',
    sub: 'If you don\'t have these figured out, that is fine. We make recommendations if the boxes are blank.',
    plans: ['standard','pro'],
    fields: [
      { id: 'hasLogo', label: 'Do you have a logo?', type: 'radio', options: [
        { value: 'yes', label: 'Yes, I will send you the file' },
        { value: 'rough', label: 'I have one but it needs help' },
        { value: 'no', label: 'No, please make recommendations' }
      ]},
      { id: 'brandColors', label: 'Brand colors', hint: '(hex codes or describe)', placeholder: '#1a2f52 navy, #7EB8F0 light blue, white accents' },
      { id: 'voiceTone', label: 'How should the site sound?', hint: '(pick the closest fit)', type: 'radio', options: [
        { value: 'straightforward', label: 'Straightforward and professional', sub: 'Clear, confident, no fluff.' },
        { value: 'warm', label: 'Warm and approachable', sub: 'Friendly neighborhood business vibe.' },
        { value: 'bold', label: 'Bold and punchy', sub: 'Confident, memorable, a little edgy.' },
        { value: 'premium', label: 'Premium and refined', sub: 'Upscale, quiet confidence.' }
      ]},
      { id: 'photos', label: 'Do you have photos we can use?', hint: '(team, jobs, before-and-afters, facility)', type: 'textarea', placeholder: 'Yes, ~50 photos in a Google Drive folder I\'ll share. Otherwise we\'ll stock photo.' },
      { id: 'existingAssets', label: 'Links to any existing assets', hint: '(Drive, Dropbox, current website, social)', type: 'textarea', placeholder: 'Current site: yourbiz.com\nPhotos: drive.google.com/...\nInstagram: @yourbiz' }
    ]
  },
  {
    id: 'tech',
    title: 'Domain, hosting, and your existing stack.',
    sub: 'Whatever you already have, we work with it. Whatever you don\'t, we set up. Just tell us what is true today.',
    plans: ['standard','pro'],
    fields: [
      { id: 'domainStatus', label: 'Do you own a domain name?', type: 'radio', options: [
        { value: 'own', label: 'Yes, I own it and can give access' },
        { value: 'own-help', label: 'Yes, but I need help with DNS' },
        { value: 'need', label: 'No, I need one registered' },
        { value: 'unsure', label: 'Not sure' }
      ]},
      { id: 'domainName', label: 'Domain name', hint: '(the one you want to use, even if not yet purchased)', placeholder: 'yourbusiness.com' },
      { id: 'hostingStatus', label: 'Current hosting situation', type: 'radio', options: [
        { value: 'none', label: 'No site or hosting right now' },
        { value: 'builder', label: 'Currently on Wix / Squarespace / GoDaddy / similar' },
        { value: 'wp', label: 'Currently on WordPress' },
        { value: 'other', label: 'Something else (we will ask later)' }
      ]},
      { id: 'gbpStatus', label: 'Google Business Profile', type: 'radio', options: [
        { value: 'verified', label: 'Claimed and verified, I have access' },
        { value: 'claimed', label: 'Claimed but I need to re-verify' },
        { value: 'none', label: 'Not claimed yet' },
        { value: 'unsure', label: 'Not sure' }
      ]},
      { id: 'socialHandles', label: 'Social media handles', hint: '(paste links or handles, leave blank for any you don\'t use)', type: 'textarea', placeholder: 'Facebook: facebook.com/yourbiz\nInstagram: @yourbiz\nLinkedIn: linkedin.com/company/yourbiz' }
    ]
  },
  {
    id: 'marketing',
    title: 'Marketing setup.',
    sub: 'Pro includes Klaviyo setup, an ad account structured and pixel-verified, conversion tracking, and a review-request page. Tell us what you already have so we don\'t duplicate it.',
    plans: ['pro'],
    fields: [
      { id: 'emailList', label: 'Do you have an existing customer email list?', type: 'radio', options: [
        { value: 'yes-big', label: 'Yes, 1,000+ emails in a CRM or spreadsheet' },
        { value: 'yes-small', label: 'Yes, under 1,000 emails somewhere' },
        { value: 'no', label: 'No, starting from scratch' }
      ]},
      { id: 'emailListWhere', label: 'Where is that list today?', hint: '(skip if no list)', placeholder: 'Mailchimp, Gmail contacts, HubSpot, a spreadsheet, QuickBooks...' },
      { id: 'klaviyoStatus', label: 'Do you have a Klaviyo account?', type: 'radio', options: [
        { value: 'have', label: 'Yes, I have one I will give access to' },
        { value: 'none', label: 'No, please create one for us' }
      ]},
      { id: 'adPlatform', label: 'Preferred ad platform', hint: '(we set up one account, structured for conversions)', type: 'radio', options: [
        { value: 'google', label: 'Google Ads', sub: 'Best for service businesses where customers search with intent.' },
        { value: 'meta', label: 'Meta (Facebook / Instagram)', sub: 'Best for visual businesses and lifestyle categories.' },
        { value: 'unsure', label: 'Not sure, recommend one', sub: 'We will pick based on your business type.' }
      ]},
      { id: 'existingAds', label: 'Are you currently running paid ads anywhere?', type: 'textarea', placeholder: 'Yes, ~$800/mo on Google through an agency I\'m leaving. No Meta. No other platforms.' },
      { id: 'reviewProfiles', label: 'Where do you currently collect reviews?', hint: '(Google, Yelp, BBB, Angi, industry-specific)', type: 'textarea', placeholder: 'Google (150+ reviews, 4.8 stars), Yelp (35 reviews), Angi...' }
    ]
  },
  {
    id: 'goals',
    title: 'Goals and timeline.',
    sub: 'The last thing we need. We optimize for the outcome you tell us here.',
    plans: ['standard','pro'],
    fields: [
      { id: 'topGoal', label: 'What is the #1 job of this website?', type: 'radio', options: [
        { value: 'calls', label: 'Get the phone ringing', sub: 'Optimize for inbound calls.' },
        { value: 'forms', label: 'Generate qualified leads', sub: 'Optimize for form fills and quote requests.' },
        { value: 'bookings', label: 'Book appointments directly', sub: 'Optimize for online scheduling.' },
        { value: 'credibility', label: 'Build credibility for sales conversations', sub: 'A site that closes the deal after first contact.' }
      ]},
      { id: 'goalMetric', label: 'What would make this website a home run in 90 days?', hint: '(a number, not a vibe)', type: 'textarea', placeholder: 'An extra 20 qualified inbound calls per month and a Google Maps listing on page one for \"HVAC Nashville\".', required: true },
      { id: 'launchDate', label: 'Target launch date', hint: '(we ship in 14 days but let us know if you have a specific date in mind)', placeholder: 'ASAP / By June 1 / End of quarter' },
      { id: 'specialNotes', label: 'Anything special we should know?', type: 'textarea', placeholder: 'We run a big promotion every spring. Our busy season is May-September. We do NOT want to show prices on the site.' }
    ]
  },
  {
    id: 'review',
    title: 'Review your answers.',
    sub: 'Make sure everything looks right. Then we turn this into your project brief and get to work.',
    plans: ['standard','pro'],
    fields: [ { type: 'review' } ]
  }
];

// ===== STATE =====
let state = {
  plan: 'pro',
  currentStep: 0,
  data: {},
  competitors: [ {name:'',url:'',note:''}, {name:'',url:'',note:''}, {name:'',url:'',note:''} ]
};

// URL param override for plan
const urlPlan = new URLSearchParams(window.location.search).get('plan');
if (urlPlan === 'standard' || urlPlan === 'pro') state.plan = urlPlan;

// Restore draft
try {
  const saved = localStorage.getItem('sitebolt-intake-v1');
  if (saved) {
    const parsed = JSON.parse(saved);
    state = { ...state, ...parsed };
  }
} catch(e) {}

// ===== HELPERS =====
function activeSteps() {
  return STEPS.filter(s => s.plans.includes(state.plan));
}
function currentStepDef() {
  const steps = activeSteps();
  return steps[Math.min(state.currentStep, steps.length - 1)];
}
function save() {
  try {
    localStorage.setItem('sitebolt-intake-v1', JSON.stringify({
      plan: state.plan,
      currentStep: state.currentStep,
      data: state.data,
      competitors: state.competitors
    }));
    const ind = document.getElementById('save-text');
    if (ind) { ind.textContent = 'Saved'; }
  } catch(e) {}
}

function setPlan(p) {
  state.plan = p;
  document.getElementById('plan-standard').classList.toggle('active', p === 'standard');
  document.getElementById('plan-pro').classList.toggle('active', p === 'pro');
  // Clamp current step
  const steps = activeSteps();
  if (state.currentStep >= steps.length) state.currentStep = steps.length - 1;
  save();
  render();
}

// ===== RENDER =====
function render() {
  const steps = activeSteps();
  const step = steps[state.currentStep];
  const card = document.getElementById('card');
  card.innerHTML = '';

  // Progress
  const pct = Math.round(((state.currentStep) / (steps.length - 1)) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-step').textContent = `Step ${state.currentStep + 1} of ${steps.length}`;
  document.getElementById('progress-percent').textContent = pct + '%';

  // Eyebrow
  const eyebrow = document.createElement('div');
  eyebrow.className = 'eyebrow';
  eyebrow.innerHTML = `${step.id.toUpperCase()} ${state.plan === 'pro' ? '<span class="pro-pill">Pro</span>' : ''}`;
  card.appendChild(eyebrow);

  // Title
  const title = document.createElement('h1');
  title.className = 'step-title';
  title.textContent = step.title;
  card.appendChild(title);

  // Sub
  const sub = document.createElement('p');
  sub.className = 'step-sub';
  sub.textContent = step.sub;
  card.appendChild(sub);

  // Fields
  const form = document.createElement('div');
  form.className = 'step-form';

  step.fields.forEach(f => form.appendChild(renderField(f)));

  card.appendChild(form);

  // Buttons
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';

  const backBtn = document.createElement('button');
  backBtn.className = 'btn btn-ghost';
  backBtn.textContent = '← Back';
  backBtn.disabled = state.currentStep === 0;
  backBtn.style.visibility = state.currentStep === 0 ? 'hidden' : 'visible';
  backBtn.onclick = () => { state.currentStep = Math.max(0, state.currentStep - 1); save(); render(); scrollTop(); };
  btnRow.appendChild(backBtn);

  const rightWrap = document.createElement('div');
  rightWrap.style.display = 'flex';
  rightWrap.style.gap = '10px';
  rightWrap.style.alignItems = 'center';

  const skipNote = document.createElement('span');
  skipNote.style.fontSize = '12px';
  skipNote.style.color = 'var(--muted)';
  skipNote.textContent = 'Your progress saves automatically';
  rightWrap.appendChild(skipNote);

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn btn-primary';
  if (step.id === 'review') {
    nextBtn.textContent = 'Generate my brief →';
    nextBtn.onclick = generateBrief;
  } else {
    nextBtn.textContent = state.currentStep === steps.length - 2 ? 'Review →' : 'Continue →';
    nextBtn.onclick = () => {
      if (!validateStep(step)) return;
      state.currentStep = Math.min(steps.length - 1, state.currentStep + 1);
      save();
      render();
      scrollTop();
    };
  }
  rightWrap.appendChild(nextBtn);
  btnRow.appendChild(rightWrap);

  card.appendChild(btnRow);
}

function scrollTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderField(f) {
  if (f.type === 'row') {
    const row = document.createElement('div');
    row.className = 'field-row';
    f.fields.forEach(sf => row.appendChild(renderField(sf)));
    return row;
  }

  if (f.type === 'review') {
    return renderReview();
  }

  if (f.type === 'competitors') {
    const wrap = document.createElement('div');
    wrap.className = 'field';
    const lbl = document.createElement('label');
    lbl.innerHTML = 'Three competitors <span class="hint">(name + website, one per row)</span>';
    wrap.appendChild(lbl);
    state.competitors.forEach((c, i) => {
      const row = document.createElement('div');
      row.className = 'competitor-row';
      const nameIn = document.createElement('input');
      nameIn.type = 'text';
      nameIn.placeholder = `Competitor ${i+1} name`;
      nameIn.value = c.name || '';
      nameIn.oninput = () => { state.competitors[i].name = nameIn.value; save(); };
      const urlIn = document.createElement('input');
      urlIn.type = 'text';
      urlIn.placeholder = 'their website';
      urlIn.value = c.url || '';
      urlIn.oninput = () => { state.competitors[i].url = urlIn.value; save(); };
      row.appendChild(nameIn);
      row.appendChild(urlIn);
      wrap.appendChild(row);
    });
    return wrap;
  }

  // Basic field
  const wrap = document.createElement('div');
  wrap.className = 'field';

  if (f.label) {
    const lbl = document.createElement('label');
    lbl.innerHTML = `${escapeHtml(f.label)}${f.hint ? ` <span class="hint">${escapeHtml(f.hint)}</span>` : ''}`;
    wrap.appendChild(lbl);
  }

  if (f.type === 'textarea') {
    const ta = document.createElement('textarea');
    ta.placeholder = f.placeholder || '';
    ta.value = state.data[f.id] || '';
    if (f.minHeight) ta.style.minHeight = f.minHeight + 'px';
    ta.oninput = () => { state.data[f.id] = ta.value; save(); };
    wrap.appendChild(ta);
  } else if (f.type === 'radio') {
    const group = document.createElement('div');
    group.className = 'radio-group';
    f.options.forEach(opt => {
      const o = document.createElement('label');
      o.className = 'radio-option' + (state.data[f.id] === opt.value ? ' selected' : '');
      const input = document.createElement('input');
      input.type = 'radio';
      input.name = f.id;
      input.value = opt.value;
      input.checked = state.data[f.id] === opt.value;
      input.onchange = () => {
        state.data[f.id] = opt.value;
        save();
        render(); // re-render to update selected style
      };
      const text = document.createElement('div');
      text.innerHTML = `<div class="opt-main">${escapeHtml(opt.label)}</div>${opt.sub ? `<div class="opt-sub">${escapeHtml(opt.sub)}</div>` : ''}`;
      o.appendChild(input);
      o.appendChild(text);
      group.appendChild(o);
    });
    wrap.appendChild(group);
  } else {
    const inp = document.createElement('input');
    inp.type = f.type || 'text';
    inp.placeholder = f.placeholder || '';
    inp.value = state.data[f.id] || '';
    inp.oninput = () => { state.data[f.id] = inp.value; save(); };
    wrap.appendChild(inp);
  }

  return wrap;
}

function renderReview() {
  const wrap = document.createElement('div');
  wrap.className = 'review-panel';

  const steps = activeSteps().filter(s => s.id !== 'review');
  steps.forEach((s, idx) => {
    const group = document.createElement('div');
    group.className = 'review-group';

    const head = document.createElement('div');
    head.className = 'review-head';
    head.innerHTML = `<h3>${escapeHtml(s.title.replace(/\.$/, ''))}</h3>`;
    const editBtn = document.createElement('button');
    editBtn.className = 'edit-link';
    editBtn.textContent = 'Edit';
    editBtn.onclick = () => { state.currentStep = idx; save(); render(); scrollTop(); };
    head.appendChild(editBtn);
    group.appendChild(head);

    if (s.id === 'competitors') {
      state.competitors.forEach((c, i) => {
        const row = document.createElement('div');
        row.className = 'review-item';
        const val = [c.name, c.url].filter(Boolean).join(' — ');
        row.innerHTML = `<div class="review-label">Competitor ${i+1}</div><div class="review-value${val ? '' : ' empty'}">${escapeHtml(val) || 'Not filled in'}</div>`;
        group.appendChild(row);
      });
      if (state.data.whyYou) {
        const row = document.createElement('div');
        row.className = 'review-item';
        row.innerHTML = `<div class="review-label">Why you win</div><div class="review-value">${escapeHtml(state.data.whyYou)}</div>`;
        group.appendChild(row);
      }
    } else {
      // Flatten fields
      const flat = [];
      s.fields.forEach(f => {
        if (f.type === 'row') f.fields.forEach(sf => flat.push(sf));
        else if (f.type === 'competitors' || f.type === 'review') {}
        else flat.push(f);
      });
      flat.forEach(f => {
        const val = state.data[f.id];
        const displayVal = val || '';
        const row = document.createElement('div');
        row.className = 'review-item';
        row.innerHTML = `<div class="review-label">${escapeHtml(f.label || f.id)}</div><div class="review-value${displayVal ? '' : ' empty'}">${escapeHtml(displayVal) || 'Not filled in'}</div>`;
        group.appendChild(row);
      });
    }

    wrap.appendChild(group);
  });

  return wrap;
}

function validateStep(step) {
  if (step.type === 'review') return true;
  const missing = [];
  const checkField = (f) => {
    if (f.type === 'row') return f.fields.forEach(checkField);
    if (f.type === 'competitors' || f.type === 'review') return;
    if (f.required) {
      const val = state.data[f.id];
      if (!val || !String(val).trim()) missing.push(f.label);
    }
  };
  step.fields.forEach(checkField);
  if (missing.length) {
    alert(`Before moving on, please fill in:\n\n• ${missing.join('\n• ')}`);
    return false;
  }
  return true;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ===== BRIEF GENERATION =====
async function generateBrief() {
  const card = document.getElementById('card');
  card.innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">BUILDING YOUR PROJECT BRIEF</div>
      <div class="loading-sub">Claude is turning your answers into a structured brief our team uses to build your site. This takes about 15 seconds.</div>
    </div>
  `;

  const payload = {
    plan: state.plan,
    data: state.data,
    competitors: state.competitors
  };

  const prompt = `You are a senior website project manager at sitebolt, a website build company. A new client just completed their intake form. Your job is to turn their answers into a clean, structured project brief our design and build team will use to scope and execute the project.

PACKAGE SELECTED: ${state.plan.toUpperCase()}

INTAKE ANSWERS (JSON):
${JSON.stringify(payload, null, 2)}

Produce a project brief with the following sections, each as a short heading then 2-5 sentences or bullet points. Write in clear, direct English. No em dashes. No corporate fluff. Do not invent facts the client did not provide. If a section lacks data, say "Client did not provide. Flag during kickoff."

Sections to include:

1. CLIENT SNAPSHOT
   One-paragraph summary of who this client is, what they sell, and who they serve.

2. PROJECT SCOPE
   Based on the ${state.plan.toUpperCase()} package, list exactly what we are delivering. Call out any custom considerations from the intake.

3. SITE ARCHITECTURE
   Recommended page list (Home, Services, each service page by name, About, Contact, Reviews, etc.) based on the services they listed.

4. POSITIONING AND MESSAGING
   In 3-5 sentences, how we should position this client against their competitors. Pull directly from their "why you win" answer. Suggest a working headline and sub-headline we can draft from.

5. TARGET CUSTOMER
   Who the site needs to convert. Pull from the customer section.

6. BRAND DIRECTION
   Tone, visual feel, any colors or assets they referenced. If they said "no logo, make recommendations," flag that as a design task.

7. TECH AND INTEGRATIONS
   Domain status, hosting setup, GBP status, social handles.
   ${state.plan === 'pro' ? 'For Pro: also include Klaviyo setup, ad platform choice, existing ad accounts, review profile integration.' : ''}

8. SUCCESS METRIC
   The client\'s specific 90-day success definition. Quote their words.

9. TIMELINE AND FLAGS
   Target launch date, any special timing notes, and any risks or gaps we need to resolve during kickoff (missing info, unclear answers, conflicts).

10. IMMEDIATE NEXT STEPS
    Bulleted list of what the sitebolt team should do within 48 hours to kick this off.

Return the brief as plain markdown. No code fences. Start with a single H1: "Project Brief: [Business Name] ([PLAN])".`;

  try {
    const response = await fetch("https://api.sitebolt.co/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-5-20250929",
        max_tokens: 2500,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    const brief = data.content[0].text;
    renderBrief(brief);
  } catch(e) {
    card.innerHTML = `
      <div class="eyebrow">Something went wrong</div>
      <h1 class="step-title">We could not generate your brief.</h1>
      <p class="step-sub">Your answers are still saved in your browser. Email us at <a href="mailto:hello@sitebolt.co" style="color:var(--blue);">hello@sitebolt.co</a> and we will pull them manually. Refresh and try again too.</p>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="state.currentStep = activeSteps().length - 1; render();">← Back to review</button>
        <button class="btn btn-primary" onclick="generateBrief()">Try again</button>
      </div>
    `;
  }
}

function renderBrief(brief) {
  const businessName = state.data.businessName || 'Your business';
  const card = document.getElementById('card');
  card.innerHTML = `
    <div class="success-banner">
      <span>✓</span>
      <span>Brief generated. A copy was saved to your browser and emailed to our team.</span>
    </div>
    <div class="brief-header">
      <div>
        <div class="eyebrow">Project Brief ${state.plan === 'pro' ? '<span class="pro-pill">Pro</span>' : ''}</div>
        <h1 class="brief-title">${escapeHtml(businessName)}</h1>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-ghost" id="copyBriefBtn">Copy</button>
        <button class="btn btn-ghost" id="downloadBriefBtn">Download .md</button>
        <button class="btn btn-primary" id="sendBriefBtn">Send to our team</button>
      </div>
    </div>
    <div class="brief-body" id="briefBody">${escapeHtml(brief)}</div>
    <div class="btn-row" style="justify-content:flex-start; margin-top:32px;">
      <button class="btn btn-text" onclick="state.currentStep = activeSteps().length - 1; render(); scrollTop();">← Back to edit answers</button>
    </div>
  `;

  document.getElementById('copyBriefBtn').onclick = () => {
    navigator.clipboard.writeText(brief);
    document.getElementById('copyBriefBtn').textContent = 'Copied ✓';
    setTimeout(() => document.getElementById('copyBriefBtn').textContent = 'Copy', 1800);
  };
  document.getElementById('downloadBriefBtn').onclick = () => {
    const blob = new Blob([brief], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sitebolt-brief-${(businessName).replace(/\s+/g,'-').toLowerCase()}.md`;
    a.click();
    URL.revokeObjectURL(url);
  };
  document.getElementById('sendBriefBtn').onclick = () => {
    const subject = encodeURIComponent(`sitebolt intake: ${businessName}`);
    const body = encodeURIComponent(brief);
    window.location.href = `mailto:hello@sitebolt.co?subject=${subject}&body=${body}`;
  };

  // Save the brief alongside the intake
  try {
    localStorage.setItem('sitebolt-intake-brief', brief);
  } catch(e) {}
}

// ===== BOOT =====
document.getElementById('plan-standard').classList.toggle('active', state.plan === 'standard');
document.getElementById('plan-pro').classList.toggle('active', state.plan === 'pro');
render();
</script>
